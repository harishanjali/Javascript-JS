<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event capturing</title>
</head>
<body>
    <div class="container">
        <button id="b1">CLick Me</button>
    </div>
    <script>
        //event capturing
        //first parent will react then chlidren
        document.querySelector('#b1').addEventListener('click',()=>{
            console.log('event triggered')//second
        },true);
        document.querySelector('.container').addEventListener('click',()=>{
            console.log('event captured at parent');//first
        },true)
    </script>
</body>
</html>
